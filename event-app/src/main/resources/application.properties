spring.application.name=event-app

# ─── Server ───────────────────────────────────────────────
server.port=8080

# ─── PostgreSQL (Server 04) ───────────────────────────────
spring.datasource.url=jdbc:postgresql://postgres-db:5432/eventdb
spring.datasource.username=eventuser
spring.datasource.password=eventpass
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── Redis (Server 02) ────────────────────────────────────
spring.data.redis.host=redis-cache
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

# ─── Cache Manager URL (Server 03) ────────────────────────
cache.manager.url=http://cache-manager:8000

# ─── Redis key settings ────────────────────────────────────
redis.key.events=events:all
redis.key.categories=categories:all
redis.key.event.prefix=event:
redis.key.ttl.seconds=3600

# ─── Thymeleaf ────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ─── Logging ──────────────────────────────────────────────
logging.level.com.eventapp=DEBUG