<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title th:text="${isEdit} ? 'Edit Event' : 'New Event'">Event Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">
<div class="container py-5" style="max-width:640px">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0" th:text="${isEdit} ? 'Edit Event' : 'New Event'">Form</h4>
    <a href="/admin" class="btn btn-outline-secondary btn-sm">← Back</a>
  </div>

  <div class="card shadow-sm border-0">
    <div class="card-body p-4">
      <form th:action="${isEdit} ? @{/admin/events/{id}/update(id=${event.id})} : '/admin/events/create'"
            method="post">

        <div class="mb-3">
          <label class="form-label fw-bold">Title <span class="text-danger">*</span></label>
          <input type="text" name="title" class="form-control"
                 th:value="${event.title}" placeholder="Event title" required/>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Description</label>
          <textarea name="description" class="form-control" rows="4"
                    placeholder="Event description..." th:text="${event.description}"></textarea>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Location</label>
            <input type="text" name="location" class="form-control"
                   th:value="${event.location}" placeholder="Venue / location"/>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Category <span class="text-danger">*</span></label>
            <select name="categoryId" class="form-select" required>
              <option value="">Select category</option>
              <option th:each="cat : ${categories}"
                      th:value="${cat.id}"
                      th:text="${cat.name}"
                      th:selected="${event.category != null and event.category.id == cat.id}">
                Category
              </option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Event Date & Time <span class="text-danger">*</span></label>
            <input type="datetime-local" name="eventDate" class="form-control"
                   th:value="${event.eventDate != null ? #temporals.format(event.eventDate, 'yyyy-MM-dd''T''HH:mm') : ''}"
                   required/>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Image URL (optional)</label>
            <input type="url" name="imageUrl" class="form-control"
                   th:value="${event.imageUrl}" placeholder="https://..."/>
          </div>
        </div>

        <div class="mb-4">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="isActive" value="true"
                   th:checked="${event.isActive == null or event.isActive}" id="isActive"/>
            <label class="form-check-label" for="isActive">Active (visible on homepage)</label>
          </div>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary px-4"
                  th:text="${isEdit} ? 'Update Event' : 'Create Event'">Save</button>
          <a href="/admin" class="btn btn-outline-secondary">Cancel</a>
        </div>

        <div class="alert alert-info mt-3 small">
          💡 After saving, the cache manager will automatically refresh Redis so the homepage reflects your changes.
        </div>
      </form>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
